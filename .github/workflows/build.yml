name: Delta Delight Forge 1.20.1 CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 強制使用 Node.js 24 以消除警告

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許建立 Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取歷史紀錄以生成 Changelog

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      # 核心分析：決定版本與抓取檔名
      - name: Analyze Build Context
        id: context
        run: |
          # 1. 抓取原始 Jar 檔名 (排除 sources/dev/api)
          RAW_JAR_PATH=$(ls build/libs/*.jar | grep -vE "-(sources|dev|api|plain)" | head -n 1)
          JAR_BASE=$(basename "$RAW_JAR_PATH" .jar)
          echo "jar_base=$JAR_BASE" >> $GITHUB_OUTPUT
          
          # 2. 取得短 Hash
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          # 3. 判斷是否為 Release
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          REGEX="update ([0-9a-zA-Z.-]+)"
          if [[ "$COMMIT_MSG" =~ $REGEX ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      # 重新命名：統一管理檔案輸出
      - name: Prepare Artifacts
        run: |
          cd build/libs
          SHORT_SHA="${{ steps.context.outputs.short_sha }}"
          IS_RELEASE="${{ steps.context.outputs.is_release }}"
          
          for f in *.jar; do
            if [[ $f != *"-sources.jar"* && $f != *"-dev.jar"* && $f != *"-api.jar"* ]]; then
              if [ "$IS_RELEASE" == "true" ]; then
                new_name="${f%.jar}-${SHORT_SHA}.jar"
              else
                new_name="${f%.jar}-dev-${SHORT_SHA}.jar"
              fi
              mv "$f" "$new_name"
            fi
          done

      # --- 上傳到 Actions Artifacts (無論是否為 Release 都執行) ---
      - name: Upload Build Artifact
        # 刪除了 if: steps.context.outputs.is_release == 'false'
        uses: actions/upload-artifact@v4
        with:
          # 動態調整名稱：如果是 Release 就加 [Release] 字樣，否則加 [Dev]
          name: ${{ steps.context.outputs.jar_base }}-${{ steps.context.outputs.is_release == 'true' && 'Release' || 'Dev' }}-${{ steps.context.outputs.short_sha }}
          path: build/libs/*.jar
          retention-days: 7

      # --- 正式版 (GitHub Release) ---
      - name: Generate Changelog
        if: steps.context.outputs.is_release == 'true'
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)")
          else
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"* %s (%h)")
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.context.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.context.outputs.version }}
          name: Delta Delight v${{ steps.context.outputs.version }} (Forge 1.20.1)
          body: |
            ## 🚀 Delta Delight Official Release
            **Commit**: ${{ steps.context.outputs.short_sha }}
            
            ### 📝 更新日誌
            ${{ steps.changelog.outputs.notes }}
          files: build/libs/*.jar