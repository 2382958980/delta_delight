name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ] # 當推送到這些分支時觸發
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Forge 1.20.1 必須使用 Java 17
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Get Build Info
        id: info
        run: |
          # 取得 build/libs 下第一個 .jar 的名稱（不含路徑與副檔名）
          JAR_NAME=$(basename $(ls build/libs/*.jar | head -n 1) .jar)
          # 取得 7 位元的 commit hash [cite: 8]
          SHORT_SHA=$(git rev-parse --short HEAD)
          # 存入環境變數供後續步驟使用
          echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # 組合名稱：例如 mymod-1.0.0-a1b2c3d [cite: 18, 19]
          name: ${{ steps.info.outputs.jar_name }}-${{ steps.info.outputs.short_sha }}
          path: build/libs/*.jar