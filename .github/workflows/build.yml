name: Delta Delight Forge 1.20.1 CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Analyze Build Context
        id: context
        run: |
          # 1. 取得短 Hash
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          # 2. 修正後的抓取邏輯：
          # 關鍵點：必須使用 -E 才能讓 grep 理解 (a|b) 語法
          # 關鍵點：使用 xargs -r 避免在找不到檔案時執行 basename
          RAW_JAR_NAME=$(ls build/libs/*.jar | grep -E -v "-(sources|dev|api|plain)" | head -n 1 | xargs -r basename -s .jar)
          
          # 檢查是否抓到檔名
          if [ -z "$RAW_JAR_NAME" ]; then
            echo "Error: No primary jar file found in build/libs/"
            echo "目前 build/libs 內容如下："
            ls -R build/libs/
            exit 1
          fi
          
          echo "jar_base=$RAW_JAR_NAME" >> $GITHUB_OUTPUT
          
          # 3. 判斷是否為 Release
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" =~ update\ ([0-9a-zA-Z.-]+) ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Files
        run: |
          cd build/libs
          SHORT_SHA="${{ steps.context.outputs.short_sha }}"
          IS_RELEASE="${{ steps.context.outputs.is_release }}"
          JAR_BASE="${{ steps.context.outputs.jar_base }}"
          
          # 針對主程式 Jar 進行改名
          if [ "$IS_RELEASE" == "true" ]; then
            mv "${JAR_BASE}.jar" "${JAR_BASE}-${SHORT_SHA}.jar" || true
          else
            mv "${JAR_BASE}.jar" "${JAR_BASE}-dev-${SHORT_SHA}.jar" || true
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          # 使用強化的變數組合名稱
          name: ${{ steps.context.outputs.jar_base }}-${{ steps.context.outputs.is_release == 'true' && 'Release' || 'Dev' }}-${{ steps.context.outputs.short_sha }}
          path: build/libs/*.jar
          retention-days: 7

      - name: Generate Changelog
        if: steps.context.outputs.is_release == 'true'
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)")
          else
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"* %s (%h)")
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.context.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.context.outputs.version }}
          name: Delta Delight v${{ steps.context.outputs.version }} (Forge 1.20.1)
          body: |
            ## 🚀 Delta Delight Official Release
            **Commit**: ${{ steps.context.outputs.short_sha }}
            
            ### 📝 更新日誌
            ${{ steps.changelog.outputs.notes }}
          files: build/libs/*.jar